name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Stop automated CI build
        run: |
          Write-Host "Automated Windows release builds are disabled."
          Write-Host "Reason: vgamepad installation is not reliable on GitHub-hosted Windows runners."
          Write-Host "Build the installer locally on Windows, then upload release assets manually."
