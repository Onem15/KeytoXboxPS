name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip setuptools wheel pyinstaller

      - name: Install app dependencies
        run: python -m pip install pyvjoy>=1.0.1 pynput>=1.7.6 ttkbootstrap>=1.10.1

      - name: Install vgamepad
        run: python -m pip install --no-build-isolation vgamepad==0.1.0

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build app bundle and installer
        run: .\build-release.ps1 -SkipDependencyInstall

      - name: Create portable zip
        run: Compress-Archive -Path .\dist\KeytoXboxPS\* -DestinationPath .\dist\KeytoXboxPS-portable.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeytoXboxPS-release
          path: |
            dist\installer\KeytoXboxPS-Setup.exe
            dist\KeytoXboxPS-portable.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\installer\KeytoXboxPS-Setup.exe
            dist\KeytoXboxPS-portable.zip
